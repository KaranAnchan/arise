# Arise — Netlify config. Works for git-linked deploys and `netlify deploy`.
# Set VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY in Site settings → Environment
# (or leave unset: the app ships local-only and the Settings page says so).

[build]
  command = "npm run build"
  publish = "dist"

# SPA router: every deep link (/gate/push, /profile, /settings) serves the shell
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
